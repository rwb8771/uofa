<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Arizona Wildcats for Randy | Arizona Basketball 2025-26</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-logo">
        <img src="https://a.espncdn.com/i/teamlogos/ncaa/500/12.png" alt="Arizona Wildcats" class="hero-logo-img">
      </div>
      <p class="hero-subtitle">2025-26 Season</p>
      <h1 class="hero-title">ARIZONA WILDCATS<br><span>FOR RANDY</span></h1>
      <p class="hero-tagline">Arizona Men's Basketball</p>
      <div class="hero-record">
        <div class="record-item">
          <span class="record-number">30</span>
          <span class="record-label">Wins</span>
        </div>
        <div class="record-divider"></div>
        <div class="record-item">
          <span class="record-number">2</span>
          <span class="record-label">Losses</span>
        </div>
        <div class="record-divider"></div>
        <div class="record-item">
          <span class="record-number">1st</span>
          <span class="record-label">Big 12</span>
        </div>
      </div>
      <a href="#roster" class="hero-roster-btn">
        <span class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        <span>ROSTER</span>
        <span class="btn-arrow">&darr;</span>
      </a>
      <p class="hero-updated">Stats last updated: March 13, 2026</p>
    </div>
  </section>

  <!-- Roster Section -->
  <section class="section roster" id="roster">
    <div class="container">
      <h2 class="section-title">2025-26 Roster</h2>
      <p class="section-subtitle">Tap any player to see their card</p>
      <div class="roster-controls">
        <div class="roster-filters">
          <select class="filter-dropdown" id="rosterFilter">
            <optgroup label="View">
              <option value="all" selected>All Players</option>
              <option value="coaches">Coaching Staff</option>
            </optgroup>
            <optgroup label="Position">
              <option value="G">Guards</option>
              <option value="F">Forwards</option>
              <option value="C">Centers</option>
            </optgroup>
            <optgroup label="Class Year">
              <option value="FR">Freshmen</option>
              <option value="SO">Sophomores</option>
              <option value="JR">Juniors</option>
              <option value="SR">Seniors</option>
            </optgroup>
          </select>
          <div id="gridSortWrap">
            <select class="filter-dropdown sort-dropdown" id="gridSort">
              <optgroup label="Sort By">
                <option value="ppg" selected>PPG</option>
                <option value="rpg">RPG</option>
                <option value="apg">APG</option>
                <option value="fg">FG%</option>
                <option value="three">3P%</option>
                <option value="ft">FT%</option>
                <option value="stl">STL</option>
                <option value="blk">BLK</option>
                <option value="totalPts">Total PTS</option>
                <option value="gp">Games</option>
                <option value="min">Minutes</option>
                <option value="number">#</option>
                <option value="name">Name</option>
              </optgroup>
            </select>
          </div>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" data-view="grid" aria-label="Grid view">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="0" y="0" width="8" height="8" rx="1.5"/><rect x="10" y="0" width="8" height="8" rx="1.5"/><rect x="0" y="10" width="8" height="8" rx="1.5"/><rect x="10" y="10" width="8" height="8" rx="1.5"/></svg>
          </button>
          <button class="view-btn" data-view="list" aria-label="List view">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="0" y="0" width="18" height="4" rx="1.5"/><rect x="0" y="7" width="18" height="4" rx="1.5"/><rect x="0" y="14" width="18" height="4" rx="1.5"/></svg>
          </button>
        </div>
      </div>
      <div id="rosterContainer"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <img src="https://a.espncdn.com/i/teamlogos/ncaa/500/12.png" alt="Arizona" class="footer-logo-img">
          <span>Arizona Wildcats for Randy</span>
        </div>
        <p>Bear Down! &middot; 2025-26 Season</p>
        <p class="footer-source">Source: ESPN, Arizona Wildcats Athletics</p>
      </div>
    </div>
  </footer>

  <!-- Basketball Card Modal -->
  <div class="modal-overlay" id="playerModal">
    <div class="bball-card-wrap">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="bball-card" id="bballCard">
        <div class="bball-card-face bball-card-front" id="cardFront"></div>
        <div class="bball-card-face bball-card-back" id="cardBack"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
